<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganMatch AI | Transplant Matching</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fa-solid fa-dna"></i>
                </div>
                <h1>OrganMatch<span>AI</span></h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline"><i class="fa-solid fa-database"></i> Database Sync</button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0D1117&color=00F0FF" alt="Admin">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="matching-workspace">
                
                <!-- Left Column: Recipients -->
                <div class="panel glass-panel">
                    <div class="panel-header">
                        <h2><i class="fa-solid fa-user-injured"></i> Recipients</h2>
                        <span class="badge" id="recipients-count">0</span>
                    </div>
                    <div class="list-container" id="recipients-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Center Column: Matching Engine -->
                <div class="center-panel">
                    <div class="engine-status">
                        <div class="status-ring">
                            <div class="ring-inner">
                                <i class="fa-solid fa-network-wired"></i>
                            </div>
                        </div>
                        <h3>Matching Engine Ready</h3>
                        <p>Cross-matching HLA, Blood Type, and Age factors.</p>
                    </div>
                    
                    <button class="btn btn-primary btn-glow" id="run-matching-btn">
                        <i class="fa-solid fa-bolt"></i> Run Deep Analysis
                    </button>

                    <div class="analysis-meta glass-panel">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <span class="stat-label">Available Organs</span>
                                <span class="stat-value" id="available-organs-count">0</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-label">Active Waitlist</span>
                                <span class="stat-value" id="active-waitlist-count">0</span>
                            </div>
                        </div>
                        <div class="sync-info">
                            <i class="fa-solid fa-clock"></i>
                            <span>Last sync:</span>
                            <span id="last-sync-time">--</span>
                        </div>
                    </div>

                    <div class="matches-preview glass-panel hidden" id="matches-results">
                        <div class="panel-header">
                            <h2><i class="fa-solid fa-handshake"></i> Top Matches Found</h2>
                        </div>
                        <div class="matches-list" id="matches-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Right Column: Donors -->
                <div class="panel glass-panel">
                    <div class="panel-header">
                        <h2><i class="fa-solid fa-hand-holding-medical"></i> Available Donors</h2>
                        <span class="badge" id="donors-count">0</span>
                    </div>
                    <div class="list-container" id="donors-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
